services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app                          # ソースコード（ホットリロード用）
      - /app/node_modules               # node_modulesはコンテナ内のみ
      - workspace_data:/app/workspace   # 同期ファイル永続化
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true          # Docker内でのファイル変更検知

volumes:
  workspace_data:
