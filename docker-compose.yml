services:
  remote-memo:
    container_name: remote-memo
    build: .
    ports:
      - "6666:6666"
    volumes:
      - workspace_data:/app/workspace   # 同期ファイル永続化
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - WATCHPACK_POLLING=true          # Docker内でのファイル変更検知
    restart: unless-stopped

volumes:
  workspace_data:
